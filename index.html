<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Patterns Grouped Tracker</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: #121212; color: #eee; margin: 0; padding: 5px; overflow: hidden; }
        
        .card { 
            background: #1e1e1e; 
            border-radius: 10px; 
            width: 100%; 
            max-width: 600px; 
            height: 98vh; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #333; 
            margin: auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .header { padding: 10px; border-bottom: 2px solid #333; flex-shrink: 0; }
        .status-bar { background: #2c2c2c; color: #ffc107; padding: 6px; border-radius: 5px; font-size: 12px; font-weight: bold; text-align: center; margin-bottom: 8px; border: 1px solid #444; }
        
        .btn-group { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn { border: none; padding: 12px 0; border-radius: 6px; font-size: 20px; font-weight: bold; cursor: pointer; color: white; flex: 1; }
        .btn-p { background: #007bff; box-shadow: 0 3px #0056b3; }
        .btn-b { background: #dc3545; box-shadow: 0 3px #a71d2a; }
        .btn-p:active, .btn-b:active { transform: translateY(2px); box-shadow: none; }
        
        .btn-action { background: #444; padding: 6px; font-size: 11px; flex: none; width: 65px; color: #bbb; border-radius: 4px; }

        .table-container { 
            flex-grow: 1; 
            overflow: auto; 
            background: #181818;
            scrollbar-width: thin;
        }
        
        .table-container::-webkit-scrollbar { height: 6px; width: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
        th { background: #252525; color: #888; position: sticky; top: 0; padding: 10px 5px; z-index: 10; border-bottom: 1px solid #444; }
        
        /* แบ่งกลุ่มด้วยสีขอบ */
        .group-1 { border-left: 2px solid #555; }
        .group-2 { border-left: 2px solid #007bff; }
        .group-3 { border-left: 2px solid #dc3545; }
        .group-4 { border-left: 2px solid #28a745; }

        td { border-bottom: 1px solid #2a2a2a; padding: 10px 4px; text-align: center; font-weight: bold; }
        
        .p-text { color: #4da3ff; }
        .b-text { color: #ff4d4d; }
        .win { background: rgba(40, 167, 69, 0.12); color: #2ecc71; }
        .loss { background: rgba(231, 76, 60, 0.12); color: #e74c3c; }
        .check-mark { font-size: 10px; display: block; margin-top: 1px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div id="next-info" class="status-bar">เก็บฐานข้อมูล 3 ตาแรก...</div>
        <div class="btn-group">
            <button class="btn btn-p" onclick="addResult('P')">P</button>
            <button class="btn btn-b" onclick="addResult('B')">B</button>
        </div>
        <div class="btn-group" style="justify-content: space-between;">
            <button class="btn btn-action" onclick="undo()">↩ Undo</button>
            <button class="btn btn-action" onclick="resetAll()" style="color:#ff4d4d">🗑 Clear</button>
        </div>
    </div>

    <div class="table-container" id="scroll-area">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th style="background:#222;">ผล</th>
                    <th class="group-1">MMM</th>
                    <th>TTT</th>
                    <th class="group-2">MTT</th>
                    <th>TMM</th>
                    <th class="group-3">MTM</th>
                    <th>TMT</th>
                    <th class="group-4">MMT</th>
                    <th>TTM</th>
                </tr>
            </thead>
            <tbody id="data-table"></tbody>
        </table>
    </div>
</div>

<script>
    let history = JSON.parse(localStorage.getItem('baccarat_8p_grouped')) || [];
    
    // จัดกลุ่ม Pattern ตามที่คุณต้องการ
    const patternOrder = ["MMM", "TTT", "MTT", "TMM", "MTM", "TMT", "MMT", "TTM"];
    const patterns = {
        "MMM": ["M", "M", "M"], "TTT": ["T", "T", "T"],
        "MTT": ["M", "T", "T"], "TMM": ["T", "M", "M"],
        "MTM": ["M", "T", "M"], "TMT": ["T", "M", "T"],
        "MMT": ["M", "M", "T"], "TTM": ["T", "T", "M"]
    };

    renderTable();

    function addResult(val) {
        history.push(val);
        saveAndRender();
    }

    function undo() {
        if (history.length > 0) { history.pop(); saveAndRender(); }
    }

    function resetAll() {
        if(confirm("ล้างสถิติทั้งหมด?")) { history = []; saveAndRender(); }
    }

    function saveAndRender() {
        localStorage.setItem('baccarat_8p_grouped', JSON.stringify(history));
        renderTable();
        const container = document.getElementById('scroll-area');
        setTimeout(() => {
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }, 50);
    }

    function renderTable() {
        const tbody = document.getElementById('data-table');
        tbody.innerHTML = "";
        
        const displayCount = Math.max(history.length, history.length >= 3 ? history.length + 1 : 0);

        for (let i = 0; i < displayCount; i++) {
            const row = tbody.insertRow(-1);
            row.insertCell(0).innerText = i + 1;
            
            const cellRes = row.insertCell(1);
            cellRes.style.background = "#1a1a1a";
            if (i < history.length) {
                cellRes.innerText = history[i];
                cellRes.className = (history[i] === 'P' ? 'p-text' : 'b-text');
            } else {
                cellRes.innerText = "?";
                cellRes.style.color = "#444";
            }

            if (i >= 3) {
                let stepIdx = (i - 3) % 3;
                let baseVal = history[i - 3];

                patternOrder.forEach((key, idx) => {
                    const cell = row.insertCell(-1);
                    const logic = patterns[key][stepIdx];
                    const pred = (logic === "M") ? baseVal : (baseVal === 'P' ? 'B' : 'P');
                    
                    // ใส่เส้นแบ่งกลุ่มในเนื้อหาตาราง
                    if (idx % 2 === 0) cell.style.borderLeft = "1px solid #333";

                    let mark = "";
                    if (i < history.length) {
                        const isWin = (history[i] === pred);
                        mark = isWin ? "✅" : "❌";
                        cell.className = isWin ? "win" : "loss";
                    }
                    
                    cell.innerHTML = `<span class="${pred==='P'?'p-text':'b-text'}">${pred}</span><span class="check-mark">${mark}</span>`;
                });
            } else {
                for(let j=0; j<8; j++) row.insertCell(-1).innerText = "-";
            }
        }
        updateStatus();
    }

    function updateStatus() {
        const nextIdx = history.length + 1;
        const statusEl = document.getElementById('next-info');
        if (nextIdx <= 3) {
            statusEl.innerText = `สร้างฐาน: ${nextIdx-1}/3`;
        } else {
            statusEl.innerText = `จัดกลุ่มคู่ข้าม: MMM-TTT | MTT-TMM | MTM-TMT | MMT-TTM`;
        }
    }
</script>

</body>
</html>
